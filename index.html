<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqeel | Official Site</title>
    <!-- استدعاء أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- استدعاء خط Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات الألوان */
        :root {
            --bg-color: #0b101d;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-color: #ffffff;
            --text-muted: #a0a8b9;
            --primary-color: #4f8cff;
            --youtube-color: #ff0033;
            --insta-gradient: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1a2744 0%, #0b101d 60%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-color);
        }

        /* البطاقة الرئيسية - تصميم زجاجي (Glassmorphism) */
        .card {
            width: 100%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        /* حلقة ضوئية خلف البطاقة */
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--primary-color), transparent, var(--youtube-color), transparent);
            opacity: 0.05;
            animation: rotateBg 10s linear infinite;
            z-index: -1;
        }

        /* أنميشن دخول البطاقة */
        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes rotateBg {
            to { transform: rotate(360deg); }
        }

        /* زر اللغة */
        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-bottom: 20px;
            transition: 0.4s;
            animation: fadeIn 1s 0.2s forwards;
            opacity: 0;
        }
        .lang-btn:hover {
            color: white;
            background: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(79, 140, 255, 0.4);
            transform: scale(1.05);
        }

        /* الصورة الشخصية */
        .avatar-container {
            margin-bottom: 15px;
            animation: fadeIn 1s 0.4s forwards;
            opacity: 0;
        }
        .avatar {
            width: 100px;
            height: 100px;
            margin: 0 auto;
            background: linear-gradient(135deg, var(--primary-color), #7b2cbf);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            box-shadow: 0 0 30px rgba(79, 140, 255, 0.2);
            position: relative;
            animation: floatAvatar 4s ease-in-out infinite;
        }
        @keyframes floatAvatar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* النصوص */
        .text-content {
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            opacity: 0;
            animation: fadeIn 1s 0.6s forwards;
        }
        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            padding: 0 10px;
            opacity: 0;
            animation: fadeIn 1s 0.8s forwards;
        }

        /* زر حساباتي الرئيسي */
        .btn-main-container {
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeIn 1s 1s forwards;
        }
        .btn-main {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 10px;
        }
        .btn-main i {
            font-size: 1.2rem;
        }
        .btn-main:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 35px rgba(59, 130, 246, 0.5);
        }
        .btn-main:active {
            transform: scale(0.95);
        }

        /* الفوتر */
        footer {
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeIn 1s 1.2s forwards;
        }

        /* ==== النافذة المنبثقة (Modal) ==== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(11, 16, 29, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #131b2e;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 360px;
            transform: scale(0.8) translateY(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.05);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-close:hover {
            background: #ff0033;
            transform: rotate(90deg);
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* أزرار السوشال ميديا في النافذة */
        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s;
            gap: 12px;
        }
        .btn-social i { font-size: 1.3rem; }
        
        .btn-youtube { background: var(--youtube-color); }
        .btn-youtube:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 0, 51, 0.4);
        }

        .btn-insta { background: var(--insta-gradient); }
        .btn-insta:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(225, 48, 108, 0.4);
        }

        /* عند تغيير اللغة، عكس اتجاه الأيقونات */
        [dir="ltr"] .btn-main i { margin-left: 0; margin-right: 10px; }
        [dir="ltr"] .modal-close { left: auto; right: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <!-- زر اللغة -->
        <button class="lang-btn" id="langToggle" onclick="toggleLanguage()">English</button>

        <!-- الصورة الشخصية -->
        <div class="avatar-container">
            <div class="avatar">
                👑
            </div>
        </div>

        <!-- النصوص -->
        <div class="text-content">
            <h1 id="welcomeTitle">مرحباً بك في عالمي</h1>
            <p id="welcomeDesc">أهلاً بك! هنا يمكنك الوصول إلى جميع حساباتي الرسمية ومتابعة جديد أعمالي.</p>
        </div>

        <!-- زر حساباتي -->
        <div class="btn-main-container">
            <button class="btn-main" id="mainBtn" onclick="openModal()">
                <i class="fa-solid fa-layer-group"></i> 
                <span id="mainBtnText">حساباتي</span>
            </button>
        </div>

        <!-- الفوتر -->
        <footer>
            <span id="footerText">© 2026 جميع الحقوق محفوظة لـ Aqeel</span>
        </footer>
    </div>

    <!-- النافذة المنبثقة -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-title" id="modalTitle">حساباتي الرسمية</div>
            
            <div class="links-container">
                <a href="https://youtube.com/@shadowvoidsv?si=E8ScmrCVUzGjOUAo" target="_blank" class="btn-social btn-youtube">
                    <i class="fab fa-youtube"></i> <span id="ytText">قناتي على يوتيوب</span>
                </a>
                <a href="https://www.instagram.com/23x5x09?igsh=emFma3p0OGV5MjZy" target="_blank" class="btn-social btn-insta">
                    <i class="fab fa-instagram"></i> <span id="instaText">حسابي في إنستغرام</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'ar';

        function openModal() {
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function closeModalOutside(e) {
            if (e.target.id === 'modalOverlay') {
                closeModal();
            }
        }

        function toggleLanguage() {
            const html = document.documentElement;
            const btn = document.getElementById('langToggle');
            const title = document.getElementById('welcomeTitle');
            const desc = document.getElementById('welcomeDesc');
            const mainBtnText = document.getElementById('mainBtnText');
            const modalTitle = document.getElementById('modalTitle');
            const ytText = document.getElementById('ytText');
            const instaText = document.getElementById('instaText');
            const footerText = document.getElementById('footerText');

            if (currentLang === 'ar') {
                html.setAttribute('lang', 'en');
                html.setAttribute('dir', 'ltr');
                btn.innerText = 'العربية';
                title.innerText = 'Welcome to My World';
                desc.innerText = 'Welcome! Here you can access all my official accounts and follow my latest work.';
                mainBtnText.innerText = 'My Accounts';
                modalTitle.innerText = 'My Official Accounts';
                ytText.innerText = 'My YouTube Channel';
                instaText.innerText = 'My Instagram Account';
                footerText.innerText = '© 2026 All Rights Reserved to Aqeel';
                currentLang = 'en';
            } else {
                html.setAttribute('lang', 'ar');
                html.setAttribute('dir', 'rtl');
                btn.innerText = 'English';
                title.innerText = 'مرحباً بك في عالمي';
                desc.innerText = 'أهلاً بك! هنا يمكنك الوصول إلى جميع حساباتي الرسمية ومتابعة جديد أعمالي.';
                mainBtnText.innerText = 'حساباتي';
                modalTitle.innerText = 'حساباتي الرسمية';
                ytText.innerText = 'قناتي على يوتيوب';
                instaText.innerText = 'حسابي في إنستغرام';
                footerText.innerText = '© 2026 جميع الحقوق محفوظة لـ Aqeel';
                currentLang = 'ar';
            }
        }
    </script>
</body>
</html>
