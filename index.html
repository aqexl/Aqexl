<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع عقيل الرسمي | Aqeel</title>
    <!-- استدعاء أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #04070d; /* خلفية أغمق للفخامة */
            --card-bg: #101624;
            --text-color: #ffffff;
            --text-muted: #a1a7b3;
            --primary-color: #3b82f6;
            --youtube-color: #ff0000;
            --insta-color: #e1306c;
            /* ألوان التوهج الناعم */
            --youtube-glow: rgba(255, 0, 0, 0.3);
            --insta-glow: rgba(225, 48, 108, 0.3);
            --primary-glow: rgba(59, 130, 246, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: all 0.3s ease-out;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at center, #1a253a 0%, #04070d 70%);
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            overflow: hidden;
        }

        /* لمسة علوية جمالية */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--youtube-color), var(--insta-color), var(--primary-color));
        }

        .lang-btn {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 9px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        .lang-btn:hover {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .avatar {
            width: 110px;
            height: 110px;
            background: #1a2236;
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            color: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }
        
        .avatar-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: 50%;
            filter: blur(15px);
            opacity: 0.5;
            z-index: -1;
        }

        h1 {
            font-size: 1.9rem;
            margin-bottom: 12px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 35px;
            line-height: 1.6;
            padding: 0 10px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 40px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            border: 1px solid transparent;
            position: relative;
        }

        /* أيقونات داخل الأزرار */
        .btn i {
            font-size: 1.3rem;
            margin-left: 12px; /* مسافة للأيقونة في الوضع العربي */
        }
        
        [dir="ltr"] .btn i {
            margin-left: 0;
            margin-right: 12px; /* مسافة للأيقونة في الوضع الإنجليزي */
        }

        /* زر يوتيوب */
        .btn-youtube {
            background-color: var(--youtube-color);
        }
        
        /* توهج ناعم لليوتيوب عند الحوم */
        .btn-youtube:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--youtube-glow);
        }

        /* زر انستاغرام */
        .btn-insta {
            background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
        }
        
        /* توهج ناعم للانستا عند الحوم */
        .btn-insta:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--insta-glow);
        }

        footer {
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

    </style>
</head>
<body>

    <div class="card">
        <!-- زر تغيير اللغة -->
        <button class="lang-btn" id="langToggle" onclick="toggleLanguage()">English</button>

        <!-- الصورة الرمزية مع تأثير خلفي ناعم -->
        <div class="avatar">
            <div class="avatar-glow"></div>
            👑
        </div>

        <!-- النصوص والترحيب -->
        <h1 id="welcomeTitle">مرحباً بك في عالمي</h1>
        <p id="welcomeDesc">أهلاً بك في موقعي المتواضع. يمكنك من هنا الوصول إلى حساباتي الرسمية ومتابعة كل جديد أقدمه.</p>

        <!-- أزرار روابط قنواتك -->
        <div class="links-container">
            <a href="https://youtube.com/@shadowvoidsv?si=E8ScmrCVUzGjOUAo" target="_blank" class="btn btn-youtube" id="ytBtn">
                <i class="fab fa-youtube"></i> <span id="ytText">قناتي على يوتيوب</span>
            </a>
            <a href="https://www.instagram.com/23x5x09?igsh=emFma3p0OGV5MjZy" target="_blank" class="btn btn-insta" id="instaBtn">
                <i class="fab fa-instagram"></i> <span id="instaText">حسابي في إنستغرام</span>
            </a>
        </div>

        <!-- الحقوق باسمك -->
        <footer>
            <span id="footerText">جميع الحقوق محفوظة © لـ عَقيل</span>
        </footer>
    </div>

    <script>
        let currentLang = 'ar';

        function toggleLanguage() {
            const html = document.documentElement;
            const btn = document.getElementById('langToggle');
            const title = document.getElementById('welcomeTitle');
            const desc = document.getElementById('welcomeDesc');
            const ytText = document.getElementById('ytText');
            const instaText = document.getElementById('instaText');
            const footerText = document.getElementById('footerText');

            if (currentLang === 'ar') {
                // التحويل إلى الإنجليزية
                html.setAttribute('lang', 'en');
                html.setAttribute('dir', 'ltr');
                btn.innerText = 'العربية';
                title.innerText = 'Welcome to My World';
                desc.innerText = 'Welcome to my humble website. From here you can access my official accounts and follow everything new I offer.';
                ytText.innerText = 'My YouTube Channel';
                instaText.innerText = 'My Instagram Account';
                footerText.innerText = 'All Rights Reserved © Aqeel';
                currentLang = 'en';
            } else {
                // العودة للعربية
                html.setAttribute('lang', 'ar');
                html.setAttribute('dir', 'rtl');
                btn.innerText = 'English';
                title.innerText = 'مرحباً بك في عالمي';
                desc.innerText = 'أهلاً بك في موقعي المتواضع. يمكنك من هنا الوصول إلى حساباتي الرسمية ومتابعة كل جديد أقدمه.';
                ytText.innerText = 'قناتي على يوتيوب';
                instaText.innerText = 'حسابي في إنستغرام';
                footerText.innerText = 'جميع الحقوق محفوظة © لـ عَقيل';
                currentLang = 'ar';
            }
        }
    </script>
</body>
</html>
